<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Página não encontrada — Amour de Prata</title>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
<meta name="theme-color" content="#2a8db1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Italiana&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#0a0a0a; --paper:#fff; --cyan:#2a8db1; --cyan-deep:#1d6e8c; --muted:#6b6b6b; --line:rgba(10,10,10,.12); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',sans-serif;color:var(--ink);background:#f6f2ec;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;text-align:center}
  .wrap{max-width:520px}
  .word{display:inline-flex;flex-direction:column;align-items:center;margin-bottom:40px;text-decoration:none}
  .word .l1{font-size:18px;font-weight:800;letter-spacing:.22em;color:var(--ink)}
  .word .l2{font-size:10px;font-weight:600;letter-spacing:.34em;color:var(--cyan);margin-top:4px}
  .code{font-family:'Italiana',serif;font-size:clamp(72px,18vw,120px);line-height:1;color:var(--cyan)}
  h1{font-size:clamp(24px,5vw,30px);font-weight:700;letter-spacing:-.02em;margin:14px 0 12px}
  h1 em{font-family:'Italiana',serif;font-style:italic;font-weight:400;color:var(--cyan)}
  p{color:var(--muted);font-size:16px;line-height:1.6;margin-bottom:32px}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:8px;height:52px;padding:0 28px;border-radius:999px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;border:1px solid var(--ink);background:var(--ink);color:var(--paper);transition:transform .2s,background .2s}
  .btn:hover{transform:translateY(-1px)}
  .btn.wa{background:var(--cyan);border-color:var(--cyan)}
  .btn.wa:hover{background:var(--cyan-deep);border-color:var(--cyan-deep)}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.ghost:hover{background:var(--ink);color:var(--paper)}
</style>
</head>
<body>
  <main class="wrap">
    <a class="word" href="/" aria-label="Amour de Prata">
      <span class="l1">AMOUR DE PRATA</span>
      <span class="l2">SILVER STORE</span>
    </a>
    <div class="code">404</div>
    <h1>Essa página <em>sumiu</em> feito brinco solto.</h1>
    <p>O link que você abriu não existe mais — mas as joias continuam aqui. Volte para o início ou fale direto com a Maria.</p>
    <div class="actions">
      <a class="btn ghost" href="/">Voltar ao início</a>
      <a class="btn wa" href="https://wa.me/5584998287232?text=Olá%20Maria%21%20Vim%20pelo%20site%20e%20quero%20conhecer%20as%20peças%20%F0%9F%92%8E" target="_blank" rel="noopener">Chamar no WhatsApp</a>
    </div>
  </main>
</body>
</html>
